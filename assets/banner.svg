<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2e2e2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="45%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="logoClip">
      <circle cx="390" cy="80" r="18"/>
    </clipPath>
  </defs>

  <rect width="900" height="160" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <line x1="0" y1="53" x2="900" y2="53" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="106" x2="900" y2="106" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="160" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="160" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Orbs -->
  <circle cx="830" cy="20" r="110" fill="white" fill-opacity="0.025"/>
  <circle cx="70" cy="145" r="90" fill="white" fill-opacity="0.02"/>

  <!-- Shimmer -->
  <rect width="900" height="160" fill="url(#glow)" rx="12"/>

  <!-- Top accent line -->
  <rect width="900" height="1" y="0" fill="url(#line)" rx="1"/>

  <!-- Logo image embedded as base64 -->
  <image href="data:image/png;base64," x="388" y="62" width="36" height="36" clip-path="url(#logoClip)"/>

  <!-- Wordmark -->
  <text x="435" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">FinLit</text>

  <!-- Tagline -->
  <text x="450" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="12" font-weight="400" fill="#666666" text-anchor="middle" letter-spacing="3.5">FINANCIAL LITERACY PLATFORM</text>
</svg>
